<section class="signup-container">

    <div class="signup-card">

        <h1>Create Your Account</h1>

        <p>
            Start your journey in Marketing, AI & Analytics.
        </p>

        <form id="signupForm">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Minimum 8 characters"
                    required>

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    required>

            </div>

            <button type="submit" class="primary-btn">

                Create Account

            </button>

        </form>

        <div class="divider">

            <span>OR</span>

        </div>

        <button class="google-btn">

            Continue with Google

        </button>

        <p class="login-link">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</section>

<script type="module">
    
import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
const form = document.getElementById("signupForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const password =
        document.getElementById("password").value;

    const confirm =
        document.getElementById("confirmPassword").value;

    if(password.length < 8){

        alert("Password must contain at least 8 characters.");

        return;

    }

    if(password !== confirm){

        alert("Passwords do not match.");

        return;

    }

    alert("Signup Successful! (Firebase integration coming soon)");

    form.reset();

});

</script>
<script type="module" src="signup.js"></script>
